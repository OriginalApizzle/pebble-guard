version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pebbleguard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pebbleguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pebbleguard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: pebbleguard-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pebbleguard?schema=public
      REDIS_URL: redis://redis:6379
    volumes:
      - bot_logs:/app/apps/bot/logs

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: pebbleguard-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pebbleguard?schema=public
    ports:
      - "3000:3000"

volumes:
  pg_data:
  redis_data:
  bot_logs:
